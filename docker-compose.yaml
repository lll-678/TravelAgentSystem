services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_tour_guide}
      POSTGRES_USER: ${POSTGRES_USER:-smart_tour}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_tour_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_tour} -d ${POSTGRES_DB:-smart_tour_guide}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-smart_tour}:${POSTGRES_PASSWORD:-smart_tour_dev}@postgres:5432/${POSTGRES_DB:-smart_tour_guide}
      API_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-smart_tour}:${POSTGRES_PASSWORD:-smart_tour_dev}@postgres:5432/${POSTGRES_DB:-smart_tour_guide}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
